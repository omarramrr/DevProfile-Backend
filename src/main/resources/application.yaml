server:
  port: 8086

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/devprofile
    username: 
    password: 
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    org.hibernate.SQL: 

openai:
  api:
    key: 
    model:
    base-url: 

jwt:
  secret: 
